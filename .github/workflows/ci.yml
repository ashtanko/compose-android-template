name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  JAVA_VERSION: 21
  JAVA_VENDOR: 'zulu'

permissions:
  contents: read

jobs:
  test_and_apk:
    name: "Host verification (make verify)"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_VENDOR }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Verify
        run: make verify

      - name: Upload build outputs (APKs)
        uses: actions/upload-artifact@v7
        with:
          name: APKs
          path: '**/build/outputs/apk/**/*.apk'

      - name: Upload JVM local results (XML)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: local-test-results
          path: '**/build/test-results/test*UnitTest/**.xml'

      - name: Upload lint reports (HTML)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: '**/build/reports/lint-results-*.html'

      - name: Upload static-analysis reports (SARIF)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: static-analysis-sarif
          path: '**/build/reports/**/*.sarif'
          if-no-files-found: ignore

      - name: Upload screenshot reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-reports
          path: '**/build/reports/screenshotTest/**'
          if-no-files-found: ignore

  upload_sarif:
    name: "Upload SARIF"
    needs: test_and_apk
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    timeout-minutes: 5

    steps:
      - name: Download SARIF reports
        uses: actions/download-artifact@v8
        with:
          name: static-analysis-sarif
          path: sarif

      - name: Upload SARIF reports
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif

  instrumented_tests:
    name: "Instrumented tests"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_VENDOR }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Run instrumented tests
        run: ./gradlew :app:ciGroupDebugAndroidTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-results
          path: '**/build/reports/androidTests/managedDevice/**'
